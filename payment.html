<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hiz Auto Payment</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}

body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#111;
  padding:20px;
}

/* MAIN PAGE */

.payment-page{
  width:1200px;
  display:grid;
  grid-template-columns:1fr 1fr;
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 15px 35px rgba(0,0,0,0.4);
}

/* LEFT SIDE IMAGE */

.left-side{
  position:relative;
  height:750px;
}

.left-side img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}

.overlay{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.55);
}

.left-text{
  position:absolute;
  bottom:50px;
  left:40px;
  z-index:2;
  color:white;
}

.left-text h1{
  font-size:50px;
  color:#00d4a3;
}

.left-text p{
  margin-top:10px;
  font-size:16px;
}

/* RIGHT SIDE */

.right-side{
  background:#00a884;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:30px;
}

.container{
  width:400px;
}

/* CARD */

.card{
  width:100%;
  height:220px;
  border-radius:20px;
  padding:25px;
  color:#fff;
  background:linear-gradient(135deg,#111,#222,#000);
  position:relative;
  overflow:hidden;
  box-shadow:0 15px 35px rgba(0,0,0,0.4);
  margin-bottom:-60px;
  z-index:2;
}

.card::before{
  content:"";
  position:absolute;
  width:300px;
  height:300px;
  border-radius:50%;
  background:radial-gradient(circle,#00d4a355,transparent);
  top:-100px;
  left:-50px;
}

.card-logo{
  font-size:20px;
  font-weight:bold;
}

.chip{
  width:60px;
  height:40px;
  background:gold;
  border-radius:8px;
  margin:20px 0;
}

.card-number{
  font-size:24px;
  letter-spacing:2px;
  margin-bottom:25px;
}

.card-info{
  display:flex;
  justify-content:space-between;
}

.card-info span{
  font-size:12px;
  opacity:0.8;
}

/* FORM */

.form{
  background:#fff;
  padding:90px 25px 25px;
  border-radius:15px;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.input-box{
  margin-bottom:20px;
}

.input-box label{
  display:block;
  margin-bottom:8px;
  color:#444;
}

.input-box input,
.input-box select{
  width:100%;
  padding:12px;
  border:1px solid #ccc;
  border-radius:8px;
  outline:none;
}

.row{
  display:flex;
  gap:10px;
}

.row .input-box{
  flex:1;
}

/* BUTTON */

button{
  width:100%;
  padding:12px;
  border:none;
  background:#00a884;
  color:#fff;
  border-radius:8px;
  cursor:pointer;
  font-size:16px;
}

button:hover{
  background:#008f70;
}

/* MOBILE */

@media(max-width:900px){

  .payment-page{
    grid-template-columns:1fr;
  }

  .left-side{
    height:300px;
  }

}

</style>

</head>
<body>

<div class="payment-page">

  <!-- LEFT IMAGE -->

  <div class="left-side">

    <a href="https://images.unsplash.com/photo-1681118503089-c5c780952b8f?q=80&w=1465&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" target="_blank">

      <img 
      src="https://images.unsplash.com/photo-1681118503089-c5c780952b8f?q=80&w=1465&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" 
      alt="Luxury Car">

    </a>

    <div class="overlay"></div>

    <div class="left-text">
      <h1>Hiz Auto</h1>
      <p>Luxury Car Rental & Premium Booking Experience</p>
    </div>

  </div>

  <!-- RIGHT PAYMENT -->

  <div class="right-side">

    <div class="container">

      <!-- CARD PREVIEW -->

      <div class="card" id="card-preview">

        <div class="card-logo">Credit Card</div>

        <div class="chip"></div>

        <div class="card-number" id="card-number">
          1345 **** **** 9866
        </div>

        <div class="card-info">

          <div>
            <span>Card Holder</span>
            <h3 id="card-holder-name">YOUR NAME</h3>
          </div>

          <div>
            <span>Expires</span>
            <h3 id="expiry">MM/YY</h3>
          </div>

        </div>

      </div>

      <div class="form">

        <!-- PAYMENT METHOD -->

        <div class="input-box">
          <label>Payment Method</label>

          <select id="payment-method">
            <option value="card">Credit / Debit Card</option>
            <option value="cod">Cash On Delivery</option>
          </select>
        </div>

        <!-- CARD FIELDS -->

        <div id="card-fields">

          <div class="input-box">
            <label>Card Number</label>
            <input type="text" id="number-input" maxlength="16">
          </div>

          <div class="input-box">
            <label>Card Holder</label>
            <input type="text" id="name-input">
          </div>

          <div class="row">

            <div class="input-box">
              <label>Month</label>

              <select id="month">
                <option>MM</option>
                <option>01</option><option>02</option><option>03</option>
                <option>04</option><option>05</option><option>06</option>
                <option>07</option><option>08</option><option>09</option>
                <option>10</option><option>11</option><option>12</option>
              </select>
            </div>

            <div class="input-box">
              <label>Year</label>

              <select id="year">
                <option>YY</option>
                <option>24</option><option>25</option>
                <option>26</option><option>27</option>
                <option>28</option>
              </select>
            </div>

            <div class="input-box">
              <label>CVV</label>
              <input type="password" maxlength="3">
            </div>

          </div>

        </div>

        <button onclick="payNow()">Pay Now</button>

      </div>

    </div>

  </div>

</div>

<script>

const numberInput = document.getElementById("number-input");
const nameInput = document.getElementById("name-input");
const cardNumber = document.getElementById("card-number");
const cardHolder = document.getElementById("card-holder-name");
const month = document.getElementById("month");
const year = document.getElementById("year");
const expiry = document.getElementById("expiry");

const paymentMethod = document.getElementById("payment-method");

const cardFields = document.getElementById("card-fields");
const cardPreview = document.getElementById("card-preview");

/* PAYMENT METHOD */

paymentMethod.addEventListener("change", () => {

  if(paymentMethod.value === "cod"){

    cardFields.style.display = "none";
    cardPreview.style.display = "none";

  }else{

    cardFields.style.display = "block";
    cardPreview.style.display = "block";

  }

});

/* CARD NUMBER */

numberInput.addEventListener("input", () => {

  let value = numberInput.value.replace(/\D/g,'');

  value = value.replace(/(.{4})/g, '$1 ').trim();

  cardNumber.innerText = value || "#### #### #### ####";

});

/* NAME */

nameInput.addEventListener("input", () => {

  cardHolder.innerText = nameInput.value || "YOUR NAME";

});

/* EXPIRY */

function updateExpiry(){

  expiry.innerText = `${month.value}/${year.value}`;

}

month.addEventListener("change", updateExpiry);
year.addEventListener("change", updateExpiry);

/* BUTTON */

function payNow(){

  alert("✅ Your Order Has Been Placed Successfully!");

}

</script>

</body>
</html>
