<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hiz Auto - Booking</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#111;
    color:#fff;
}


.navbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 8%;
    background:#000;
}

.logo{
    font-size:28px;
    font-weight:700;
    color:#fff;
}

.logo span{
    color:#ff7a00;
}

.nav-links{
    display:flex;
    list-style:none;
    gap:25px;
}

.nav-links a{
    color:white;
    text-decoration:none;
    transition:.3s;
}

.nav-links a:hover{
    color:#ff7a00;
}


.booking-hero{
    height:300px;
    background:url('https://www.carpro.com/hs-fs/hubfs/2023-Chevrolet-Corvette-Z06-credit-chevrolet.jpeg?width=1020&name=2023-Chevrolet-Corvette-Z06-credit-chevrolet.jpeg') center/cover;
    position:relative;
}

.booking-overlay{
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,0,0,.7);
}

.booking-text{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
    z-index:2;
}

.booking-text h1{
    font-size:45px;
    color:#ff7a00;
}

.booking-text p{
    margin-top:10px;
}

/* FORM */

.booking-container{
    padding:60px 8%;
}

.booking-card{
    max-width:1100px;
    margin:auto;
    background:#1b1b1b;
    padding:35px;
    border-radius:15px;
    border:1px solid #ff7a00;
}

.booking-card h2{
    color:#ff7a00;
    margin-bottom:20px;
}

.section-title{
    margin-top:35px;
}

.form-row{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
    margin-bottom:20px;
}

.input-group{
    display:flex;
    flex-direction:column;
}

.input-group label{
    margin-bottom:8px;
}

.input-group input,
.input-group select{
    width:100%;
    padding:14px;
    border:none;
    border-radius:8px;
    background:#222;
    color:white;
    outline:none;
}

.input-group input:focus,
.input-group select:focus{
    border:1px solid #ff7a00;
}

.checkbox-box{
    margin-bottom:30px;
}

.booking-btn{
    width:100%;
    padding:15px;
    border:none;
    border-radius:8px;
    background:#ff7a00;
    color:white;
    font-size:17px;
    font-weight:600;
    cursor:pointer;
    transition:.3s;
}

.booking-btn:hover{
    background:#e86c00;
}


footer{
    text-align:center;
    padding:20px;
    background:#000;
    margin-top:50px;
}

/* MOBILE */

@media(max-width:768px){

    .navbar{
        flex-direction:column;
        gap:15px;
    }

    .nav-links{
        flex-wrap:wrap;
        justify-content:center;
    }

    .form-row{
        grid-template-columns:1fr;
    }

    .booking-text h1{
        font-size:30px;
    }

    .booking-card{
        padding:20px;
    }

}

</style>

</head>
<body>

<header>

<nav class="navbar">

<div class="logo">
Hiz<span>Auto</span>
</div>

<ul class="nav-links">
<li><a href="index.html">Home</a></li>
<li><a href="cars.html">Cars</a></li>
<li><a href="about.html">About</a></li>
<li><a href="booking.html">Booking</a></li>
</ul>

</nav>

</header>

<section class="booking-hero">

<div class="booking-overlay"></div>

<div class="booking-text">
<h1>Book Your Dream Car</h1>
<p>Luxury, Comfort & Reliable Rentals</p>
</div>

</section>

<section class="booking-container">

<form id="bookingForm">

<div class="booking-card">

<h2>Contact Details</h2>

<div class="form-row">

<div class="input-group">
<label>Mobile Number</label>
<input type="tel" placeholder="+92 3XX XXXXXXX" required>
</div>

<div class="input-group">
<label>Email Address</label>
<input type="email" placeholder="example@gmail.com" required>
</div>

</div>

<div class="checkbox-box">
<input type="checkbox" required>
I agree to receive booking updates and notifications.
</div>

<h2 class="section-title">Traveller Details</h2>

<div class="form-row">

<div class="input-group">
<label>Title</label>
<select required>
<option>Select Title</option>
<option>Mr</option>
<option>Mrs</option>
<option>Ms</option>
</select>
</div>

<div class="input-group">
<label>Select Car</label>
<select required>
<option>Select Car</option>
<option>Honda Civic</option>
<option>Toyota Corolla</option>
<option>Audi A5</option>
<option>HAVAL H6</option>
<option>Peugeot 2008</option>
<option>Toyota Land Cruiser</option>
<option>Jaecoo J5</option>
</select>
</div>

</div>

<div class="form-row">

<div class="input-group">
<label>First Name</label>
<input type="text" placeholder="Enter First Name" required>
</div>

<div class="input-group">
<label>Last Name</label>
<input type="text" placeholder="Enter Last Name" required>
</div>

</div>

<div class="form-row">

<div class="input-group">
<label>Date of Birth</label>
<input type="date">
</div>

<div class="input-group">
<label>CNIC Number</label>
<input type="text" placeholder="12345-1234567-1">
</div>

</div>

<div class="form-row">

<div class="input-group">
<label>Pick-up Date</label>
<input type="date" required>
</div>

<div class="input-group">
<label>Return Date</label>
<input type="date" required>
</div>

</div>

<div class="input-group" style="margin-bottom:20px;">
<label>Pick-up Location</label>
<input type="text" placeholder="Enter Location">
</div>

<button type="submit" class="booking-btn">
Confirm Booking
</button>

</div>

</form>

</section>

<footer>
<p>© 2026 Hiz Auto Car Rental. All Rights Reserved.</p>
</footer>

<script>

document.getElementById("bookingForm").addEventListener("submit",function(e){

e.preventDefault();


window.location.href = "payment.html";

});

</script>

</body>
</html>
